# dataproc 工具自带配置（与 agent 完全解耦，凭据互不可见）
# 端侧部署时按实例覆写；也可用环境变量（DATAPROC_OCR_ENABLED / RUN_REAL_OCR /
# DATAPROC_LLM_KIND/BASE_URL/MODEL/API_KEY / DATAPROC_KNOWN_CATALOG）覆盖。

# OCR Tier1：端侧可选装。默认关闭，保证纯文本/结构化源在无 PaddleOCR 环境也能跑。
ocr_enabled: false
# 真正调用 PaddleOCR（需已 pip install paddlepaddle paddleocr）。否则扫描件/图片保持
# ocr_pending 占位、不触发重依赖。也可用 RUN_REAL_OCR=1 临时开启。
run_real_ocr: false

# 工具自带 LLM provider（仅用于结构化抽取，禁止改写 OCR 事实）。默认 none = 仅规则抽取。
llm:
  kind: none            # none | openai | ollama
  base_url: ""          # openai 默认 https://api.openai.com/v1；ollama 默认 http://localhost:11434/v1
  model: ""             # 如 qwen2.5:latest / gpt-4o-mini
  api_key: ""           # 仅工具自身；不可与 agent 共享

# 已知商品目录（实体解析已知列表来源）：上一次 bundle 的 products.ndjson，或企业提供的目录。
# 留空则仅靠 reg_number / (brand,name,stage) 元组兜底解析。
known_catalog: ""
